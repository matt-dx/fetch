name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.images/**'
      - 'README.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: dotnet test Fetch.slnx -c Release

      - run: dotnet publish src/Fetch.Cli/Fetch.Cli.csproj -c Release -r win-x64 -o publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release #${{ github.run_number }}
          files: publish/fetch.exe
          generate_release_notes: true
